version: "3.8"

services:
  api:
    build: .
    container_name: siscom-admin-api
    environment:
      PROJECT_NAME: ${PROJECT_NAME:-SISCOM Admin API}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT:-5432}
      DB_USER: ${DB_USER:-siscom}
      DB_PASSWORD: ${DB_PASSWORD:-changeme}
      DB_NAME: ${DB_NAME:-siscom_admin}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      SNS_PLATFORM_APPLICATION_ARN_IOS: ${SNS_PLATFORM_APPLICATION_ARN_IOS:-}
      SNS_PLATFORM_APPLICATION_ARN_ANDROID: ${SNS_PLATFORM_APPLICATION_ARN_ANDROID:-}
      COGNITO_REGION: ${COGNITO_REGION:-us-east-1}
      COGNITO_USER_POOL_ID: ${COGNITO_USER_POOL_ID}
      COGNITO_CLIENT_ID: ${COGNITO_CLIENT_ID}
      COGNITO_CLIENT_SECRET: ${COGNITO_CLIENT_SECRET}
      DEFAULT_USER_PASSWORD: ${DEFAULT_USER_PASSWORD:-TempPass123!}
      # AWS SES - Email Configuration
      SES_FROM_EMAIL: ${SES_FROM_EMAIL}
      SES_REGION: ${SES_REGION:-us-east-1}
      # Frontend URL
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      # Contact Email - Email donde se reciben los mensajes de contacto
      CONTACT_EMAIL: ${CONTACT_EMAIL:-contacto@geminislabs.com}
      # Google reCAPTCHA v3
      RECAPTCHA_SECRET_KEY: ${RECAPTCHA_SECRET_KEY}
      # PASETO - Token para compartir ubicación
      PASETO_SECRET_KEY: ${PASETO_SECRET_KEY}
      # KORE Wireless - API para envío de comandos SMS
      KORE_CLIENT_ID: ${KORE_CLIENT_ID}
      KORE_CLIENT_SECRET: ${KORE_CLIENT_SECRET}
      KORE_API_AUTH: ${KORE_API_AUTH}
      KORE_API_SMS: ${KORE_API_SMS}
      # Kafka - Alert rules updates
      KAFKA_BROKERS: ${KAFKA_BROKERS}
      KAFKA_RULES_UPDATES_TOPIC: ${KAFKA_RULES_UPDATES_TOPIC}
      KAFKA_GEOFENCES_UPDATES_TOPIC: ${KAFKA_GEOFENCES_UPDATES_TOPIC}
      KAFKA_USER_DEVICES_UPDATES_TOPIC: ${KAFKA_USER_DEVICES_UPDATES_TOPIC}
      KAFKA_RULES_UPDATES_GROUP_ID: ${KAFKA_RULES_UPDATES_GROUP_ID}
      KAFKA_SASL_USERNAME: ${KAFKA_SASL_USERNAME}
      KAFKA_SASL_PASSWORD: ${KAFKA_SASL_PASSWORD}
      KAFKA_SASL_MECHANISM: ${KAFKA_SASL_MECHANISM}
      KAFKA_SECURITY_PROTOCOL: ${KAFKA_SECURITY_PROTOCOL:-SASL_PLAINTEXT}
    ports:
      - "8100:8100"
    volumes:
      - .:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8100 --reload
    networks:
      - siscom-network
networks:
  siscom-network:
    external: true
volumes:
  postgres_data:
