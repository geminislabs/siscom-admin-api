name: CI

on:
  pull_request:
    branches: [master, develop]
  push:
    branches: [master, develop]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Ruff
        run: ruff check app/ tests/

      - name: Run Black
        run: black --check app/ tests/

      - name: Run tests with coverage
        env:
          DB_HOST: localhost
          DB_PORT: "5432"
          DB_USER: test
          DB_PASSWORD: test
          DB_NAME: test
          COGNITO_REGION: us-east-1
          COGNITO_USER_POOL_ID: us-east-1_testpool
          COGNITO_CLIENT_ID: test-client-id
          COGNITO_CLIENT_SECRET: test-client-secret
          SES_FROM_EMAIL: test@example.com
          FRONTEND_URL: http://localhost:3000
          PASETO_SECRET_KEY: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
        run: pytest tests/ -v --cov=app --cov-report=term-missing --cov-report=xml

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: htmlcov/
          retention-days: 14

      - name: Build Docker image
        run: docker build -t siscom-admin-api:ci .

  security:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Gitleaks secret scan
        run: bash scripts/gitleaks-scan.sh

      - name: Semgrep static analysis
        uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/python
            p/secrets

      - name: pip-audit dependency scan
        run: bash scripts/pip-audit-scan.sh

      - name: OSV dependency scan
        run: bash scripts/osv-scan.sh
